<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#FF9900" />
  <meta name="description" content="Amazon Profit Pro - Calculateur de profit Amazon FBA/FBM gratuit" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Amazon Profit Pro" />
  <link rel="manifest" href="/manifest.json" />
  <link rel="icon" type="image/svg+xml" href="/vite.svg" />
  <link rel="apple-touch-icon" href="/icon-192.png" />
  <title>Amazon Profit Pro - Calculateur FBA Gratuit</title>
</head>
<body>
  <div id="root"></div>
  <script>
    // Enregistrer le Service Worker
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/sw.js')
          .then(reg => console.log('SW enregistré:', reg.scope))
          .catch(err => console.log('SW erreur:', err));
      });
    }
    
    // Demander permission notifications
    if ('Notification' in window && Notification.permission === 'default') {
      Notification.requestPermission();
    }
  </script>
  <script type="module" src="/src/main.jsx"></script>
</body>
</html>
