<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=1200, height=630">
  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      width: 1200px;
      height: 630px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      color: white;
    }
    .container {
      text-align: center;
      padding: 60px;
    }
    h1 {
      font-size: 72px;
      margin: 0 0 20px 0;
      font-weight: 900;
    }
    .subtitle {
      font-size: 32px;
      margin: 0 0 40px 0;
      opacity: 0.9;
    }
    .features {
      display: flex;
      gap: 40px;
      justify-content: center;
      margin-top: 40px;
    }
    .feature {
      background: rgba(255,255,255,0.2);
      padding: 20px 30px;
      border-radius: 12px;
      font-size: 18px;
    }
    .badge {
      background: #FFD700;
      color: #000;
      padding: 10px 20px;
      border-radius: 20px;
      font-weight: bold;
      font-size: 20px;
      margin-top: 30px;
      display: inline-block;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🚀 TradeAI Global</h1>
    <div class="subtitle">Plateforme e-commerce intelligence gratuite</div>
    <div class="features">
      <div class="feature">🌍 22 Marketplaces</div>
      <div class="feature">📊 Cash-Flow 12 Mois</div>
      <div class="feature">💰 ROI & Marge</div>
    </div>
    <div class="badge">100% Gratuit • Sans Inscription</div>
  </div>
</body>
</html>
